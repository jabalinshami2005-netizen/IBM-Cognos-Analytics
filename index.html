<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCare Analytics</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
  <div class="login-card">
    <h2>MediCare Analytics</h2>

    <input type="text" id="loginUsername" placeholder="Username">
    <input type="password" id="loginPassword" placeholder="Password">

    <button id="doLoginBtn">Login</button>
    <div id="loginError" class="error-msg">Invalid credentials</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardApp" class="dashboard-wrapper">

  <div class="navbar">
    <h2>MediTrack Pro</h2>
    <button id="logoutBtn">Logout</button>
  </div>

  <div id="kpiContainer" class="kpi-grid"></div>

  <canvas id="satisfactionChart"></canvas>

</div>

<!-- JS FILE -->
<script src="script.js"></script>

</body>
</html>
